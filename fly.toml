app = "churn-ml-app"

[env]
  PYTHON_ENV = "production"
  LOG_LEVEL = "info"

[build]
  dockerfile = "Dockerfile"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[checks]
  [checks.tcp]
    grace_period = "5s"
    interval = "30s"
    timeout = "5s"
